upstream web {
    server web:3000;
}

upstream orchestrator {
    server orchestrator:8000;
}

server {
    listen 80;
    server_name _;

    location /api/orchestrator/ {
        proxy_pass http://orchestrator/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
