# Local development environment
# Run: docker compose up -d
# All services with hot-reload

networks:
  multiagent:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    container_name: multiagent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: multiagent
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: multiagent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - multiagent
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U multiagent"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: multiagent-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - multiagent
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application Services ────────────────────────────────────────────────────

  orchestrator:
    build:
      context: ./services/orchestrator
      dockerfile: Dockerfile
    container_name: multiagent-orchestrator
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
      - path: .env.local
        required: false
    environment:
      - DATABASE_URL=postgresql://multiagent:localdev@postgres:5432/multiagent
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=development
    volumes:
      - ./services/orchestrator/src:/app/src  # Hot reload
      - ./services/agents:/app/agents          # Agent packages
      - ./config:/app/config                   # Rules YAML
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - multiagent
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    container_name: multiagent-worker
    restart: unless-stopped
    env_file:
      - .env
      - path: .env.local
        required: false
    environment:
      - DATABASE_URL=postgresql://multiagent:localdev@postgres:5432/multiagent
      - REDIS_URL=redis://redis:6379
      - ORCHESTRATOR_URL=http://orchestrator:8000
      - ENVIRONMENT=development
    volumes:
      - ./services/worker/src:/app/services/worker/src  # Hot reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - multiagent

  mcp-shopify:
    build:
      context: .
      dockerfile: services/mcp-shopify/Dockerfile
    container_name: multiagent-mcp-shopify
    restart: unless-stopped
    ports:
      - "3100:3100"
    env_file:
      - .env
      - path: .env.local
        required: false
    environment:
      - WRITE_ENABLED=false
      - ENVIRONMENT=development
    volumes:
      - ./services/mcp-shopify/src:/app/services/mcp-shopify/src  # Hot reload
    networks:
      - multiagent
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    container_name: multiagent-web
    restart: unless-stopped
    ports:
      - "3001:3000"   # Host 3001 — leave 3000 free for local `pnpm dev`
    env_file:
      - .env
      - path: .env.local
        required: false
    environment:
      - DATABASE_URL=postgresql://multiagent:localdev@postgres:5432/multiagent
      - REDIS_URL=redis://redis:6379
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    volumes:
      - ./apps/web/src:/app/apps/web/src      # Hot reload
      - ./packages:/app/packages              # Shared packages
    depends_on:
      - postgres
      - redis
      - orchestrator
    networks:
      - multiagent

  # ── Dev Tools ──────────────────────────────────────────────────────────────

  # Redis GUI — http://localhost:8001
  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: multiagent-redis-insight
    restart: unless-stopped
    ports:
      - "8001:8001"
    networks:
      - multiagent
    profiles:
      - tools  # Only start with: docker compose --profile tools up

  # Postgres GUI — http://localhost:5050
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: multiagent-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=dev@local.com
      - PGADMIN_DEFAULT_PASSWORD=localdev
    networks:
      - multiagent
    profiles:
      - tools
